spring:
  application:
    name: circleguard-auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/circleguard_auth
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  ldap:
    urls: ldap://localhost:389
    base: dc=circleguard,dc=edu
    username: cn=admin,dc=circleguard,dc=edu
    password: admin

jwt:
  secret: "my-super-secret-dev-key-32-chars-long-12345678"
  expiration: 3600000

qr:
  secret: "my-qr-secret-key-for-dev-1234567890"
  expiration: 300

server:
  port: 8180

# URL del servicio de identidades (configurable por ambiente via variable de entorno)
circleguard:
  identity-service:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8083}

# Configuración del patrón Bulkhead (CA 1.1, 1.2, 1.3)
# Patrón de Resiliencia: Limita la concurrencia hacia identity-service para
# evitar que una sobrecarga o fallo de dicho servicio consuma todos los hilos
# del auth-service y cause un colapso en cascada.
resilience4j:
  bulkhead:
    instances:
      identityService:
        max-concurrent-calls: 5     # Máximo de llamadas simultáneas permitidas
        max-wait-duration: 200ms    # Tiempo máximo de espera antes de rechazar la solicitud

# Observabilidad e instrumentación (CA 3.1)
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always
