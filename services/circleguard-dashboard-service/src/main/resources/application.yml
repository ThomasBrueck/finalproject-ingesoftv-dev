spring:
  application:
    name: circleguard-dashboard-service
  datasource:
    url: jdbc:postgresql://localhost:5432/circleguard_dashboard
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8084

circleguard:
  promotion-service:
    url: ${PROMOTION_SERVICE_URL:http://localhost:8088}

resilience4j:
  circuitbreaker:
    instances:
      promotionService:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

  tracing:
    sampling:
      probability: ${SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${JAEGER_OTLP_ENDPOINT:http://jaeger-collector.stage.svc.cluster.local:4318/v1/traces}
