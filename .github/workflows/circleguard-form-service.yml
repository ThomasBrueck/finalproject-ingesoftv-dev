name: "CI/CD — circleguard-form-service"

on:
  push:
    branches: [master]
    paths: ['services/circleguard-form-service/**']
  pull_request:
    branches: [master]
    paths: ['services/circleguard-form-service/**']
  workflow_dispatch:
    inputs:
      dev-branch:
        description: 'Branch a construir'
        required: false
        default: master

jobs:
  pipeline:
    uses: ThomasBrueck/finalproject-ingesoftv-ops/.github/workflows/_cicd-pipeline.yml@fix/test-ports-pipeline
    with:
      service-name: circleguard-form-service
      dev-branch: ${{ inputs.dev-branch || github.head_ref || 'master' }}
      run-cd: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    secrets:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      DEV_REPO_TOKEN: ${{ secrets.DEV_REPO_TOKEN }}
