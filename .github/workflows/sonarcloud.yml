name: SonarCloud Analysis

# Un único análisis del monorepo por commit. Va en un workflow aparte (no en el
# pipeline por-servicio) porque los 8 pipelines analizan el mismo project key y
# el mismo commit en paralelo, y SonarCloud rechaza reportes duplicados del
# mismo commit ("a newer report has already been processed").

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Evita análisis solapados sobre la misma ref.
concurrency:
  group: sonarcloud-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonar:
    name: SonarCloud (proyecto completo)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      # Corre los tests de todos los módulos para generar el JaCoCo completo y
      # luego el análisis con el Quality Gate bloqueante, todo en una sola pasada.
      - name: Tests + SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./gradlew test sonar --no-daemon \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=thomasbrueck \
            -Dsonar.projectKey=ThomasBrueck_finalproject-ingesoftv-dev \
            -Dsonar.qualitygate.wait=true
